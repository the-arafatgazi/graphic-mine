<style>
:root{
  --paper:#F4F1E9;
  --paper-2:#FBFAF6;
  --ink:#16130D;
  --ink-2:#5C584E;
  --c:#0098D4;   /* cyan */
  --m:#E6007E;   /* magenta */
  --y:#FFC600;   /* yellow */
  --k:#16130D;   /* key */
  --line:rgba(22,19,13,.14);
  --line-2:rgba(22,19,13,.28);
  --display:"Space Grotesk",system-ui,sans-serif;
  --body:"Inter",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,monospace;
  --maxw:1180px;
  --pad:clamp(20px,5vw,72px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.mono{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}

/* CMYK dots motif */
.cmyk{display:inline-flex;gap:5px;vertical-align:middle}
.cmyk i{width:9px;height:9px;border-radius:50%;display:inline-block}
.cmyk i:nth-child(1){background:var(--c)}
.cmyk i:nth-child(2){background:var(--m)}
.cmyk i:nth-child(3){background:var(--y)}
.cmyk i:nth-child(4){background:var(--k)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--ink);color:var(--paper);font-weight:600;font-size:.92rem;padding:.8rem 1.3rem;border:1px solid var(--ink);border-radius:2px;cursor:pointer;transition:transform .18s,background .18s,color .18s}
.btn:hover{transform:translateY(-2px);background:var(--c);border-color:var(--c)}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.ghost:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn svg{width:18px;height:18px;fill:currentColor}

/* nav */
nav{position:sticky;top:0;z-index:60;background:rgba(244,241,233,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.brand{font-family:var(--display);font-weight:700;font-size:1.15rem;letter-spacing:-.01em;display:flex;align-items:center;gap:.6rem}
.nav-links{display:flex;align-items:center;gap:1.5rem}
.nav-links a:not(.btn){font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2);transition:color .2s}
.nav-links a:not(.btn):hover{color:var(--ink)}

/* hero */
.hero{position:relative;padding:clamp(54px,9vw,120px) 0 clamp(40px,6vw,72px)}
.crop{position:absolute;width:18px;height:18px;border:0;pointer-events:none;opacity:.5}
.crop::before,.crop::after{content:"";position:absolute;background:var(--ink-2)}
.crop::before{width:100%;height:1px;top:50%}.crop::after{height:100%;width:1px;left:50%}
.hero .c-tl{top:18px;left:var(--pad)}.hero .c-tr{top:18px;right:var(--pad)}
.hero-eyebrow{display:flex;align-items:center;gap:.7rem;color:var(--ink-2);margin-bottom:1.6rem;flex-wrap:wrap}
.hero h1{font-family:var(--display);font-weight:700;line-height:.95;letter-spacing:-.03em;font-size:clamp(3rem,11vw,7.5rem);margin-bottom:1.4rem}
.hero h1 .dot{color:var(--m)}
.hero .lead{font-size:clamp(1.05rem,1.6vw,1.3rem);color:var(--ink-2);max-width:46ch;margin-bottom:2rem}
.hero .lead strong{color:var(--ink);font-weight:600}
.hero-cta{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:2.6rem}
.feats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.feat{background:var(--paper);padding:1.1rem 1.2rem}
.feat .ft{font-family:var(--display);font-weight:600;font-size:1.05rem}
.feat .fl{font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-top:.3rem}

/* section shell */
section.block{padding:clamp(56px,8vw,104px) 0;border-top:1px solid var(--line)}
.job{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--m);margin-bottom:.9rem}
.sec-h{font-family:var(--display);font-weight:700;font-size:clamp(1.9rem,4.5vw,3.1rem);letter-spacing:-.02em;line-height:1.02;max-width:18ch;margin-bottom:.8rem}
.sec-sub{color:var(--ink-2);max-width:54ch;margin-bottom:clamp(2rem,4vw,3rem)}

/* services */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.svc{background:var(--paper-2);padding:clamp(1.4rem,2.5vw,2rem);transition:background .2s}
.svc:hover{background:var(--paper)}
.svc .sn{font-family:var(--mono);font-size:.7rem;color:var(--c);letter-spacing:.1em}
.svc h3{font-family:var(--display);font-weight:600;font-size:1.3rem;margin:.7rem 0 .6rem}
.svc p{color:var(--ink-2);font-size:.92rem;margin-bottom:.9rem}
.svc ul{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.svc li{font-size:.86rem;color:var(--ink-2);padding-left:1rem;position:relative}
.svc li::before{content:"";position:absolute;left:0;top:.55em;width:5px;height:5px;border-radius:50%;background:var(--m)}

/* pricing */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.price{background:var(--paper-2);padding:clamp(1.3rem,2.4vw,1.8rem)}
.price h3{font-family:var(--display);font-weight:600;font-size:1.15rem;margin-bottom:.8rem}
.price .from{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.price .amt{font-family:var(--display);font-weight:700;font-size:2.1rem;line-height:1;margin:.2rem 0}
.price .per{font-size:.8rem;color:var(--ink-2);margin-bottom:.7rem}
.price .desc{font-size:.85rem;color:var(--ink-2)}

/* QUOTE BUILDER */
.quote{background:var(--ink);color:var(--paper);border-radius:4px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
.quote .q-form{padding:clamp(1.8rem,4vw,3rem)}
.quote .q-side{padding:clamp(1.8rem,4vw,3rem);background:#1f1b13;display:flex;flex-direction:column;justify-content:space-between;gap:1.5rem}
.quote label{display:block;font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:#a9a399;margin:1.1rem 0 .4rem}
.quote label:first-of-type{margin-top:0}
.quote select,.quote input{width:100%;background:#0f0d09;border:1px solid #34302a;color:var(--paper);font-family:var(--body);font-size:1rem;padding:.75rem .85rem;border-radius:3px}
.quote select:focus,.quote input:focus{outline:none;border-color:var(--c)}
.q-dims{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.q-est-label{font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#a9a399}
.q-est{font-family:var(--display);font-weight:700;font-size:clamp(2.4rem,6vw,3.6rem);line-height:1;margin:.3rem 0 .2rem}
.q-est .cur{color:var(--y)}
.q-note{font-size:.82rem;color:#a9a399;line-height:1.5}
.q-side .btn{background:var(--y);color:var(--ink);border-color:var(--y);width:100%;justify-content:center}
.q-side .btn:hover{background:var(--paper);border-color:var(--paper);transform:translateY(-2px)}

/* process */
.proc{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}
.step{background:var(--paper-2);padding:1.5rem 1.3rem}
.step .pn{font-family:var(--display);font-weight:700;font-size:1.6rem;color:var(--c)}
.step h3{font-family:var(--display);font-weight:600;font-size:1.1rem;margin:.5rem 0 .5rem}
.step p{font-size:.84rem;color:var(--ink-2)}

/* why + stats */
.why-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(2rem,5vw,4rem);align-items:start}
.why-body p{color:var(--ink-2);margin-bottom:1rem}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line)}
.stat{background:var(--paper-2);padding:1.4rem}
.stat .n{font-family:var(--display);font-weight:700;font-size:2.2rem;line-height:1}
.stat .n .u{color:var(--m)}
.stat .l{font-family:var(--mono);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-top:.4rem}

/* work */
.work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.w-item{aspect-ratio:4/3;background:var(--paper-2);border:1px solid var(--line);border-radius:3px;overflow:hidden;position:relative;display:flex;align-items:flex-end;padding:1rem}
.w-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.w-item .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--line-2)}
.w-item .ph .cmyk i{width:14px;height:14px}
.w-item span{position:relative;font-family:var(--mono);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;background:var(--ink);color:var(--paper);padding:.35rem .6rem;border-radius:2px}

/* contact */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4rem)}
.contact-list{display:flex;flex-direction:column;gap:.7rem;margin-top:1.4rem}
.cl{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.1rem;border:1px solid var(--line);border-radius:3px;background:var(--paper-2);transition:border-color .2s,transform .2s}
.cl:hover{border-color:var(--m);transform:translateY(-2px)}
.cl .k{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}
.cl .v{font-weight:600;font-size:.95rem;margin-top:.2rem}
.brief-box{border:1px solid var(--line);border-radius:3px;padding:clamp(1.4rem,3vw,2rem);background:var(--paper-2)}
.brief-box h3{font-family:var(--display);font-weight:600;font-size:1.3rem;margin-bottom:.7rem}
.brief-box p{color:var(--ink-2);font-size:.92rem;margin-bottom:1.2rem}
.brief-box strong{color:var(--ink)}

/* footer */
footer{border-top:1px solid var(--line);padding:2.4rem 0;background:var(--ink);color:var(--paper)}
.foot-inner{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:#a9a399}
.foot-inner .b{display:flex;align-items:center;gap:.6rem;color:var(--paper);font-family:var(--display);font-weight:700;letter-spacing:0;text-transform:none;font-size:1rem}

/* floating whatsapp */
.wa-fab{position:fixed;right:clamp(16px,3vw,28px);bottom:clamp(16px,3vw,28px);z-index:80;display:inline-flex;align-items:center;gap:.6rem;background:#1faf54;color:#fff;padding:.85rem 1.05rem;border-radius:999px;box-shadow:0 12px 30px -10px rgba(31,175,84,.6);font-weight:600;font-size:.92rem;transition:transform .2s,background .2s}
.wa-fab:hover{background:#178f44;transform:translateY(-2px)}
.wa-fab svg{width:24px;height:24px;fill:currentColor;flex-shrink:0}
@media(max-width:600px){.wa-fab .wa-label{display:none}.wa-fab{padding:.9rem}}

/* reveal */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.reveal.in{opacity:1;transform:none}

/* responsive */
@media(max-width:900px){
  .feats{grid-template-columns:1fr 1fr}
  .svc-grid,.price-grid{grid-template-columns:1fr 1fr}
  .proc{grid-template-columns:1fr 1fr}
  .quote{grid-template-columns:1fr}
  .why-grid,.contact-grid{grid-template-columns:1fr;gap:1.6rem}
  .work-grid{grid-template-columns:1fr 1fr}
  .nav-links a:not(.btn){display:none}
}
@media(max-width:560px){
  .feats,.svc-grid,.price-grid,.proc,.work-grid{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important}.reveal{opacity:1;transform:none}}
</style>

const waIcon = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.945C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.633 5.443l-.999 3.648 3.755-.99zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>`;

function render(){
  const d = DATA;
  const app = document.getElementById("app");

  const nav = `<nav><div class="nav-inner">
    <a href="#top" class="brand">${d.brandName} ${cmyk}</a>
    <div class="nav-links">
      <a href="#services">Services</a><a href="#pricing">Pricing</a>
      <a href="#quote">Quote</a><a href="#process">Process</a><a href="#work">Work</a>
      <a href="#contact" class="btn">Get a quote</a>
    </div></div></nav>`;

  const feats = d.feats.map(f=>`<div class="feat"><div class="ft">${esc(f.t)}</div><div class="fl">${esc(f.l)}</div></div>`).join("");
  const hero = `<header class="hero">
    <span class="crop c-tl"></span><span class="crop c-tr"></span>
    <div class="wrap">
      <div class="hero-eyebrow mono">${esc(d.est)} ${cmyk} ${esc(d.kicker)}</div>
      <h1>${esc(d.heroLine1)}<br>${esc(d.heroLine2)}<span class="dot">.</span></h1>
      <p class="lead">${d.heroLead}</p>
      <div class="hero-cta">
        <a href="#quote" class="btn">Build a quote</a>
        <a href="#services" class="btn ghost">See services</a>
      </div>
      <div class="feats reveal">${feats}</div>
    </div></header>`;

  const svc = d.services.map((s,i)=>{
    const li = s.li.map(x=>`<li>${esc(x)}</li>`).join("");
    return `<div class="svc reveal"><div class="sn">S—0${i+1}</div><h3>${esc(s.t)}</h3><p>${esc(s.d)}</p><ul>${li}</ul></div>`;
  }).join("");
  const services = `<section id="services" class="block"><div class="wrap">
    <div class="job">Job 01 — Services</div>
    <h2 class="sec-h">Everything from pixel to paper.</h2>
    <p class="sec-sub">One agency for the whole job — design, production and print under a single roof, so nothing gets lost between the idea and the ink.</p>
    <div class="svc-grid">${svc}</div></div></section>`;

  const price = d.pricing.map(p=>`<div class="price reveal"><h3>${esc(p.t)}</h3>
    <div class="from">Starts from</div><div class="amt">${esc(p.amt)}</div>
    <div class="per">${esc(p.per)}</div><div class="desc">${esc(p.desc)}</div></div>`).join("");
  const pricing = `<section id="pricing" class="block"><div class="wrap">
    <div class="job">Job 02 — Pricing</div>
    <h2 class="sec-h">Prices that start smart.</h2>
    <p class="sec-sub">All prices shown are standard MRP (maximum retail) in BDT. Final rate depends on size, quantity, paper and finish. Build an estimate below or ask for an exact quote.</p>
    <div class="price-grid">${price}</div></div></section>`;

  const opts = d.quoteItems.map((q,i)=>`<option value="${i}">${esc(q.name)}</option>`).join("");
  const quote = `<section id="quote" class="block"><div class="wrap">
    <div class="job">Job 03 — Instant quote</div>
    <h2 class="sec-h">Build your quote.</h2>
    <p class="sec-sub">Pick a job, set the quantity, and send it straight to us on WhatsApp. This is an estimate — we confirm the exact rate within 24 hours.</p>
    <div class="quote reveal">
      <div class="q-form">
        <label for="q-item">What do you need?</label>
        <select id="q-item">${opts}</select>
        <div id="q-qty-wrap">
          <label for="q-qty">Quantity</label>
          <input id="q-qty" type="number" inputmode="numeric" value="1000">
          <div class="q-est-label" id="q-hint" style="margin-top:.4rem"></div>
        </div>
        <div id="q-dim-wrap" style="display:none">
          <label>Banner size (feet)</label>
          <div class="q-dims">
            <input id="q-w" type="number" inputmode="decimal" placeholder="Width" value="6">
            <input id="q-h" type="number" inputmode="decimal" placeholder="Height" value="3">
          </div>
        </div>
      </div>
      <div class="q-side">
        <div>
          <div class="q-est-label">Estimated total</div>
          <div class="q-est"><span class="cur">৳</span><span id="q-amount">2,500</span></div>
          <div class="q-note" id="q-spec"></div>
        </div>
        <a id="q-send" class="btn" href="#" target="_blank" rel="noopener">${waIcon} Send order on WhatsApp</a>
      </div>
    </div></div></section>`;

  const steps = d.process.map((s,i)=>`<div class="step reveal"><div class="pn">0${i+1}</div><h3>${esc(s.t)}</h3><p>${esc(s.d)}</p></div>`).join("");
  const process = `<section id="process" class="block"><div class="wrap">
    <div class="job">Job 04 — Process</div>
    <h2 class="sec-h">From brief to press.</h2>
    <p class="sec-sub">Five steps, no surprises. You approve a proof before a single sheet runs.</p>
    <div class="proc">${steps}</div></div></section>`;

  const stats = d.stats.map(s=>`<div class="stat"><div class="n">${esc(s.n)}<span class="u">${esc(s.u)}</span></div><div class="l">${esc(s.l)}</div></div>`).join("");
  const whyBody = d.whyBody.map(p=>`<p>${esc(p)}</p>`).join("");
  const why = `<section id="why" class="block"><div class="wrap">
    <div class="job">Job 05 — Why Graphic Mine</div>
    <div class="why-grid">
      <div><h2 class="sec-h">Designers who know the press.</h2>
        <p class="sec-sub" style="margin-bottom:1.2rem">${esc(d.whyLead)}</p>
        <div class="why-body">${whyBody}</div></div>
      <div class="stats reveal">${stats}</div>
    </div></div></section>`;

  const work = d.work.map(w=>{
    const inner = w.img ? `<img src="${esc(w.img)}" alt="${esc(w.t)}">` : `<div class="ph">${cmyk}</div>`;
    return `<div class="w-item reveal">${inner}<span>${esc(w.t)}</span></div>`;
  }).join("");
  const workSec = `<section id="work" class="block"><div class="wrap">
    <div class="job">Job 06 — Work</div>
    <h2 class="sec-h">Recent work.</h2>
    <p class="sec-sub">A few jobs off the press. Add your own photos from the DATA block.</p>
    <div class="work-grid">${work}</div></div></section>`;

  const waMsg = encodeURIComponent("Hi Graphic Mine, I'd like a quote. Job: ____, Quantity/Size: ____, Deadline: ____.");
  const contact = `<section id="contact" class="block"><div class="wrap">
    <div class="job">Job 07 — Contact</div>
    <h2 class="sec-h">Talk to the mine.</h2>
    <p class="sec-sub">Message us on WhatsApp for the fastest reply, or call during studio hours.</p>
    <div class="contact-grid">
      <div>
        <div class="contact-list">
          <a class="cl" href="${waBase}?text=${waMsg}" target="_blank" rel="noopener"><div><div class="k">WhatsApp · fastest</div><div class="v">${esc(d.phoneDisplay)}</div></div><span>↗</span></a>
          <a class="cl" href="${esc(d.facebook)}" target="_blank" rel="noopener"><div><div class="k">Facebook</div><div class="v">${esc(d.facebookName)}</div></div><span>↗</span></a>
          <a class="cl" href="mailto:${esc(d.email)}"><div><div class="k">Email</div><div class="v">${esc(d.email)}</div></div><span>↗</span></a>
          <div class="cl"><div><div class="k">Studio</div><div class="v">${esc(d.studio)}</div></div></div>
        </div>
      </div>
      <div class="brief-box">
        <h3>How to brief us</h3>
        <p>Tell us three things: <strong>what it is</strong> (card, banner, brochure…), <strong>how many</strong>, and <strong>when you need it</strong>. Attach a reference if you have one — we'll handle the rest, from design to delivery.</p>
        <a class="btn" href="#quote">Build a quote ↑</a>
      </div>
    </div></div></section>`;

  const footer = `<footer><div class="wrap"><div class="foot-inner">
    <span class="b">${d.brandName} ${cmyk}</span>
    <span>Make simple, but significant</span>
    <span>© <span id="yr"></span> · Printing · Press · Advertising — Dhaka</span>
  </div></div></footer>
  <a class="wa-fab" href="${waBase}?text=${waMsg}" target="_blank" rel="noopener" aria-label="Chat on WhatsApp">${waIcon}<span class="wa-label">WhatsApp</span></a>`;

  app.innerHTML = nav + hero + services + pricing + quote + process + why + workSec + contact + footer;
  const yr = document.getElementById("yr"); if(yr) yr.textContent = new Date().getFullYear();

  setupQuote();
  const io = new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

/* ===================== QUOTE LOGIC ===================== */
function setupQuote(){
  const items = DATA.quoteItems;
  const sel = document.getElementById("q-item");
  const qtyWrap = document.getElementById("q-qty-wrap");
  const dimWrap = document.getElementById("q-dim-wrap");
  const qty = document.getElementById("q-qty");
  const w = document.getElementById("q-w");
  const h = document.getElementById("q-h");
  const hint = document.getElementById("q-hint");
  const amountEl = document.getElementById("q-amount");
  const specEl = document.getElementById("q-spec");
  const sendBtn = document.getElementById("q-send");
  const fmt = n => Math.round(n).toLocaleString("en-IN");

  function recalc(){
    const it = items[+sel.value] || items[0];
    let total = 0, spec = "";
    if(it.type==="qty"){
      qtyWrap.style.display=""; dimWrap.style.display="none";
      hint.textContent = it.hint || "";
      let q = Math.max(it.min||1, parseInt(qty.value)||0);
      total = (q/it.unit)*it.rate;
      spec = `${it.name} — ${fmt(q)} pcs`;
    } else if(it.type==="sqft"){
      qtyWrap.style.display="none"; dimWrap.style.display="";
      let ww = Math.max(1, parseFloat(w.value)||0);
      let hh = Math.max(1, parseFloat(h.value)||0);
      let area = ww*hh;
      total = area*it.rate;
      spec = `${it.name} — ${ww} × ${hh} ft (${fmt(area)} sq ft)`;
    } else { /* flat */
      qtyWrap.style.display="none"; dimWrap.style.display="none";
      total = it.rate;
      spec = `${it.name} — fixed project`;
    }
    amountEl.textContent = fmt(total);
    specEl.textContent = spec + " · estimate only";
    const msg = `Hi Graphic Mine, I'd like to order:%0A• ${spec}%0A• Estimated: ৳${fmt(total)}%0A%0AMy deadline: ____%0AMy name: ____`;
    sendBtn.href = `https://wa.me/${DATA.whatsapp}?text=${msg}`;
  }
  sel.addEventListener("change", ()=>{ const it=items[+sel.value]; if(it.type==="qty"){qty.value=it.min||100;} recalc(); });
  [qty,w,h].forEach(el=>el && el.addEventListener("input", recalc));
  recalc();
}
render();
</script>
